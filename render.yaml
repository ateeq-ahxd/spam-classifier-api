services:
  - type: web
    name: spam-classifier-api
    runtime: python
    buildCommand: uv pip install -r requirements.txt --system
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GIPHY_API_KEY
        sync: false
      - key: MODEL_PATH
        value: models/spam_model.pkl
      - key: TFIDF_PATH
        value: models/tfidf_vectorizer.pkl
      - key: MODEL_GDRIVE_ID
        sync: false
      - key: TFIDF_GDRIVE_ID
        sync: false
